game: merge
cluster: test
module: platserver
configDir: "../config"

etcd:
  - group: 1
    host: 10.7.1.165:3379
    username: NONE
    password: NONE

http:
  http_listen_addr: 0.0.0.0:11002
  http_read_timeout: 60000
  http_write_timeout: 60000
  http_idle_timeout: 60000
  enable_tls: false
  tls_cert_file: "../conf/server.crt"
  tls_key_file: "../conf/server.key"

rpc:
  server:
    address: "0.0.0.0:11102"
    enable_reflection: false
    keepalive_time: 10
    keepalive_timeout: 3
    enforcement_min_time: 5
  client:
    timeout: 3

logCfg:
  logLevel: info
  developMode: false

pprof:
  enabled: true
  addr: "0.0.0.0:11902"
